<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Card body -->
  <rect x="4" y="10" width="40" height="28" rx="4" ry="4"
    stroke="currentColor" stroke-width="2.5" fill="none"/>

  <!-- Magnetic stripe -->
  <rect x="4" y="17" width="40" height="6"
    fill="currentColor" opacity="0.85"/>

  <!-- Chip -->
  <rect x="10" y="27" width="8" height="6" rx="1.5"
    stroke="currentColor" stroke-width="1.8" fill="none"/>
  <line x1="14" y1="27" x2="14" y2="33"
    stroke="currentColor" stroke-width="1.2"/>
  <line x1="10" y1="30" x2="18" y2="30"
    stroke="currentColor" stroke-width="1.2"/>

  <!-- Card number dots -->
  <circle cx="24" cy="30" r="1.2" fill="currentColor"/>
  <circle cx="28" cy="30" r="1.2" fill="currentColor"/>
  <circle cx="32" cy="30" r="1.2" fill="currentColor"/>
  <circle cx="36" cy="30" r="1.2" fill="currentColor"/>
</svg>
