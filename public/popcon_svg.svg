<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Create a mask to cut out the center -->
    <mask id="centerCutout">
      <rect width="200" height="200" fill="white"/>
      <circle cx="100" cy="100" r="33.75" fill="black"/>
    </mask>
  </defs>
  
  <!-- Four circles with transparent center (25% larger) -->
  <g mask="url(#centerCutout)">
    <!-- Top circle -->
    <circle cx="100" cy="69" r="37.5" fill="none" stroke="#fbfca9" stroke-width="7.5" />
    
    <!-- Bottom left circle -->
    <circle cx="68" cy="119" r="37.5" fill="none" stroke="#fbfca9" stroke-width="7.5" />
    
    <!-- Bottom right circle -->
    <circle cx="132" cy="119" r="37.5" fill="none" stroke="#fbfca9" stroke-width="7.5" />
    
    <!-- Center circle -->
    <circle cx="100" cy="100" r="37.5" fill="none" stroke="#fbfca9" stroke-width="7.5" />
  </g>
</svg>
